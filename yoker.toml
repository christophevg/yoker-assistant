# yoker-assistant configuration skeleton.
# The owner fills in the real backend/model. Plugins and skills are wired now.

[backend]
provider = "ollama"  # adjust to your provider

[backend.ollama]
base_url = "http://localhost:11434"
model = "qwen3.5:cloud"  # adjust to your model
timeout_seconds = 60

[context]
manager = "basic_persistence"
storage_path = "./context"
session_id = "auto"
persist_after_turn = true

[permissions]
filesystem_paths = ["."]
network_access = "none"

[plugins]
enabled = true
packages = ["yoker_assistant", "pkgq"]

[plugins.trusted]
yoker_assistant = true
pkgq = true

[skills]
directories = ["./skills"]